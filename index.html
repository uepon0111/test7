<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>楽曲ライブラリ | PROJECT SEKAI 楽曲データベース</title>
<meta name="description" content="プロジェクトセカイの楽曲一覧・詳細・試聴ができる非公式の楽曲ライブラリです。">
<meta name="theme-color" content="#fbfbfe">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://sekai-world.github.io">
<link rel="preconnect" href="https://storage.sekai.best">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/list.css">
<link rel="stylesheet" href="css/detail.css">
<link rel="stylesheet" href="css/player.css">
<link rel="stylesheet" href="css/settings.css">
</head>
<body>
<div id="app">

  <!-- ===== Loading / error states (shown before data is ready) ===== -->
  <div class="screen-state" id="loadingScreen">
    <div class="spinner"></div>
    <div class="screen-state__title">楽曲データを読み込んでいます…</div>
  </div>

  <div class="screen-state" id="errorScreen" hidden>
    <svg class="icon" style="width:32px;height:32px;opacity:.5"><use href="#ic-alert"></use></svg>
    <div class="screen-state__title">データの読み込みに失敗しました</div>
    <div>ネットワーク接続を確認して、もう一度お試しください。</div>
    <button type="button" class="btn btn--primary" id="retryBtn">
      <svg class="icon"><use href="#ic-refresh"></use></svg>再読み込み
    </button>
  </div>

  <!-- ===== App shell (hidden until data is ready) ===== -->
  <div id="appShell" hidden>

    <header class="app-header">
      <div class="app-header__row">
        <div class="app-wordmark">
          <span class="app-wordmark__mark"><svg class="icon" aria-hidden="true"><use href="#ic-note-comp"></use></svg></span>
          <span class="app-wordmark__text">楽曲ライブラリ</span>
        </div>

        <div class="search-box">
          <div class="search-box__field">
            <svg class="icon" aria-hidden="true"><use href="#ic-search"></use></svg>
            <input type="text" class="search-box__input" id="searchInput" autocomplete="off" spellcheck="false"
                   placeholder="タイトル・作詞作曲編曲者で検索" aria-label="楽曲を検索">
            <button type="button" class="search-box__clear" id="searchClearBtn" aria-label="検索をクリア">
              <svg class="icon" aria-hidden="true"><use href="#ic-close"></use></svg>
            </button>
          </div>
          <div class="search-suggestions" id="searchSuggestions"></div>
        </div>

        <button type="button" class="icon-btn icon-btn--badge" id="filterToggleBtn" aria-label="絞り込み・並び替え">
          <svg class="icon" aria-hidden="true"><use href="#ic-filter"></use></svg>
          <span class="icon-btn__dot" style="display:none"></span>
        </button>

        <button type="button" class="icon-btn" id="settingsToggleBtn" aria-label="設定">
          <svg class="icon" aria-hidden="true"><use href="#ic-settings"></use></svg>
        </button>
      </div>
    </header>

    <div id="listControls">
      <div class="control-rail">
        <div class="list-toolbar">
          <span class="result-count mono" id="resultCount">0曲</span>
          <div class="view-toggle" role="group" aria-label="表示形式の切り替え">
            <button type="button" data-mode="list1" aria-label="1列表示（タイトルメイン）">
              <svg class="icon" aria-hidden="true"><use href="#ic-grid1"></use></svg>
            </button>
            <button type="button" data-mode="grid3" aria-label="3列表示（サムネイルメイン）">
              <svg class="icon" aria-hidden="true"><use href="#ic-grid3"></use></svg>
            </button>
            <button type="button" class="view-toggle__grid5" data-mode="grid5" aria-label="5列表示">
              <svg class="icon" aria-hidden="true"><use href="#ic-grid5"></use></svg>
            </button>
          </div>
        </div>
      </div>

      <div class="filter-sort-panel" id="filterSortPanel">
        <div class="field-block">
          <div class="field-label"><svg class="icon" aria-hidden="true"><use href="#ic-sort"></use></svg>並び替え</div>
          <div class="chip-row" id="sortFieldRow"></div>
          <div class="chip-row" style="margin-top:8px">
            <button type="button" class="chip" id="sortDirectionBtn"></button>
          </div>
          <div class="field-block" id="sortLevelDifficultyWrap" hidden>
            <div class="field-label">基準にする難易度</div>
            <div class="chip-row" id="sortLevelDifficultyRow"></div>
          </div>
        </div>

        <div class="field-block">
          <div class="field-label"><svg class="icon" aria-hidden="true"><use href="#ic-piece"></use></svg>ユニット</div>
          <div class="chip-row" id="unitTagRow"></div>
        </div>

        <div class="field-block">
          <div class="field-label"><svg class="icon" aria-hidden="true"><use href="#ic-pen"></use></svg>書き下ろし</div>
          <div class="chip-row" id="newlyWrittenRow"></div>
        </div>

        <div class="field-block">
          <div class="field-label"><svg class="icon" aria-hidden="true"><use href="#ic-mic"></use></svg>歌唱キャラクター（複数選択・AND検索）</div>
          <div class="character-grid" id="characterFilterGrid"></div>
        </div>

        <div class="field-block">
          <button type="button" class="btn btn--ghost btn--full" id="resetFiltersBtn">
            <svg class="icon" aria-hidden="true"><use href="#ic-refresh"></use></svg>絞り込みをリセット
          </button>
        </div>
      </div>
    </div>

    <main class="app-main" id="appMain">
      <div class="song-grid mode-grid3" id="songGrid"></div>
    </main>

    <section class="detail-view" id="detailView" hidden></section>

    <!-- ===== Settings overlay ===== -->
    <div class="overlay-scrim" id="settingsScrim" hidden></div>
    <aside class="settings-panel" id="settingsPanel" hidden aria-label="設定">
      <div class="settings-panel__header">
        <h2 class="settings-panel__title">設定</h2>
        <button type="button" class="icon-btn" id="settingsCloseBtn" aria-label="閉じる">
          <svg class="icon" aria-hidden="true"><use href="#ic-close"></use></svg>
        </button>
      </div>
      <div class="settings-panel__section">
        <div class="switch-row">
          <span class="switch-row__label">冒頭スキップ</span>
          <button type="button" class="switch" id="introSkipToggle" role="switch" aria-checked="false" aria-label="冒頭スキップ"></button>
        </div>
      </div>
    </aside>

    <!-- ===== Confirm dialog (external navigation warning) ===== -->
    <div class="dialog-overlay" id="confirmDialog" hidden>
      <div class="dialog" role="alertdialog" aria-modal="true" aria-labelledby="confirmDialogTitle">
        <div class="dialog__icon"><svg class="icon" aria-hidden="true"><use href="#ic-alert"></use></svg></div>
        <div class="dialog__title" id="confirmDialogTitle"></div>
        <div class="dialog__message" id="confirmDialogMessage"></div>
        <div class="dialog__actions">
          <button type="button" class="btn btn--ghost" id="confirmDialogCancelBtn"></button>
          <button type="button" class="btn btn--primary" id="confirmDialogConfirmBtn"></button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- ===== Persistent mini player (background playback) ===== -->
    <div class="mini-player" id="miniPlayer">
      <audio id="audioEl" preload="none"></audio>
      <div class="mini-player__seek seek-bar js-seek-bar" id="miniPlayerSeek">
        <div class="seek-bar__track">
          <div class="seek-bar__ticks"></div>
          <div class="seek-bar__buffered"></div>
          <div class="seek-bar__fill"></div>
          <div class="seek-bar__handle"></div>
        </div>
        <div class="seek-bar__time-row">
          <span class="seek-bar__current mono">0:00</span>
          <span class="seek-bar__duration mono">0:00</span>
        </div>
      </div>
      <div class="mini-player__row">
        <div class="mini-player__thumb"><img id="miniPlayerThumb" src="" alt=""></div>
        <div class="mini-player__text" id="miniPlayerText">
          <div class="mini-player__title" id="miniPlayerTitle"></div>
          <div class="mini-player__caption" id="miniPlayerCaption"></div>
        </div>
        <div class="mini-player__controls">
          <button type="button" class="icon-btn" data-player-action="seek-back" aria-label="5秒戻る">
            <svg class="icon" aria-hidden="true"><use href="#ic-rewind5"></use></svg>
          </button>
          <button type="button" class="mini-player__play" data-player-action="toggle-play" aria-label="再生">
            <svg class="icon" aria-hidden="true"><use href="#ic-play"></use></svg>
          </button>
          <button type="button" class="icon-btn" data-player-action="seek-forward" aria-label="5秒進む">
            <svg class="icon" aria-hidden="true"><use href="#ic-forward5"></use></svg>
          </button>
        </div>
      </div>
    </div>

  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
