<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>プロセカ リザルト管理</title>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="stylesheet" href="./styles/app.css">
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
  <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
  <script type="module" src="./js/app.js"></script>
</head>
<body>
  <div class="modal" id="imageModal" onclick="if(event.target === this) closeImageModal()">
    <span class="close-btn" onclick="closeImageModal()">×</span>
    <img class="modal-content-img" id="modalImg"/>
  </div>

  <div class="modal" id="batchModal" style="background-color: rgba(0,0,0,0.5);">
    <div class="modal-form-content">
      <div class="modal-header">
        <span id="batch-modal-title"><span class="material-symbols-outlined">cloud_upload</span> 画像アップロード・編集</span>
        <span onclick="closeBatchModal()" style="cursor:pointer;">×</span>
      </div>
      <div id="upload-initial" style="display: flex; flex: 1;">
        <div class="drop-zone" id="drop-zone" onclick="document.getElementById('btn-upload-files').click()">
          <span class="material-symbols-outlined" style="font-size: 64px; margin-bottom: 10px;">upload_file</span>
          <div style="font-size: 1.2rem; font-weight: bold;">クリックして画像を選択</div>
          <div style="font-size: 0.9rem; margin-top: 5px;">または画像をここにドラッグ＆ドロップ</div>
          <input accept="image/*" id="btn-upload-files" multiple="" style="display: none;" type="file"/>
        </div>
      </div>
      <div class="split-container" id="batch-workspace" style="display: none;">
        <div class="sidebar">
          <div class="sidebar-toolbar">
            <button class="btn-analyze-all" onclick="analyzeAllInBatch()">
              <span class="material-symbols-outlined">analytics</span> 一括解析 (すべて)
            </button>
          </div>
          <div id="batch-sidebar-list" style="overflow-y:auto; flex:1;"></div>
        </div>
        <div class="main-area">
          <div class="editor-layout" id="batch-editor-container" style="display: none;">
            <div class="preview-pane">
              <img crossorigin="anonymous" id="batch-preview-img" src=""/>
            </div>
            <div class="form-pane">
              <button class="btn-reanalyze" id="btn-reanalyze" type="button">
                <span class="material-symbols-outlined" style="font-size:1rem;">analytics</span> この画像を再解析
              </button>
              <div class="form-group">
                <label>機種</label>
                <div class="profile-inline">
                  <select id="up-device" style="width:100%; box-sizing:border-box;"></select>
                </div>
              </div>
              <div class="form-group">
                <label>曲名</label>
                <input id="up-title" style="width: 100%; box-sizing: border-box;" type="text"/>
              </div>
              <div style="display:flex; gap:10px;">
                <div class="form-group" style="flex:1;">
                  <label>レベル</label>
                  <input id="up-level" style="width: 100%; box-sizing: border-box;" type="number"/>
                </div>
                <div class="form-group" style="flex:1;">
                  <label>難易度</label>
                  <select id="up-diff" style="width: 100%; box-sizing: border-box;">
                    <option value="easy">EASY</option>
                    <option value="normal">NORMAL</option>
                    <option value="hard">HARD</option>
                    <option value="expert">EXPERT</option>
                    <option value="master">MASTER</option>
                    <option value="append">APPEND</option>
                  </select>
                </div>
              </div>
              <div class="form-group">
                <label>判定内訳</label>
                <div class="breakdown-group" style="grid-template-columns: repeat(2, minmax(0,1fr));">
                  <div class="breakdown-item"><label style="color:#f5b5b5;">PERFECT</label><input id="up-perfect" min="0" type="number" value="0"/></div>
                  <div class="breakdown-item"><label style="color:#f0d28a;">GREAT</label><input id="up-great" min="0" type="number" value="0"/></div>
                  <div class="breakdown-item"><label style="color:#8ac5f7;">GOOD</label><input id="up-good" min="0" type="number" value="0"/></div>
                  <div class="breakdown-item"><label style="color:#9bfcc0;">BAD</label><input id="up-bad" min="0" type="number" value="0"/></div>
                  <div class="breakdown-item"><label style="color:#e0e0e0;">MISS</label><input id="up-miss" min="0" type="number" value="0"/></div>
                  <div class="breakdown-item"><label style="color:#c0c0ff;">COMBO</label><input id="up-combo" min="0" type="number" value="0"/></div>
                </div>
                <div class="total-score">
                  総ミス数: <span id="up-total-miss" style="font-size:1.2rem; color:var(--diff-master);">0</span>
                </div>
              </div>
            </div>
          </div>
          <div id="batch-empty-msg" style="margin:auto; color:#999; text-align:center;">左のリストから画像を選択してください</div>
        </div>
      </div>
      <div class="modal-header" id="batch-msg-area" style="font-size: 0.9rem; padding: 10px 20px; background: #f8f9fa; border-top: 1px solid #eee; border-bottom: none; display:block;">
        <span id="batch-status-msg">待機中...</span>
      </div>
      <div class="form-actions">
        <button class="btn-cancel" id="btn-close-batch">閉じる</button>
        <button class="btn-submit" disabled="" id="btn-exec-batch">実行</button>
      </div>
    </div>
  </div>

  <div class="modal" id="settingsModal" style="background-color: rgba(0,0,0,0.5);">
    <div class="modal-form-content" style="width:min(1200px, 96vw); max-height: 92vh;">
      <div class="modal-header">
        <span><span class="material-symbols-outlined">settings</span> 読み取り範囲設定</span>
        <span id="btn-settings-close" style="cursor:pointer;">×</span>
      </div>
      <div class="settings-layout">
        <aside class="settings-sidebar">
          <div class="profile-actions">
            <button class="btn-ghost" id="btn-new-profile" type="button">新規作成</button>
            <button class="btn-ghost" id="btn-delete-profile" type="button">削除</button>
          </div>
          <div class="small-note">サンプル画像を読み込んで、機種ごとの範囲を調整して保存できます。</div>
          <div id="settings-profile-list" class="settings-sidebar-list scroll-area"></div>
        </aside>
        <main class="settings-main">
          <div class="settings-toolbar">
            <input type="file" accept="image/*" id="settings-sample-file"/>
            <input type="text" id="settings-profile-name" placeholder="機種名"/>
            <input type="number" id="settings-profile-width" placeholder="幅"/>
            <input type="number" id="settings-profile-height" placeholder="高さ"/>
          </div>
          <div class="settings-preview" id="settings-preview-stage">
            <img id="settings-preview-img" alt="sample"/>
            <div style="position:absolute; left:12px; top:12px; color:white; background:rgba(0,0,0,.55); padding:6px 8px; border-radius:8px; font-size:.8rem;">
              ドラッグで移動 / 右下ハンドルで拡大
            </div>
          </div>
          <div class="region-tabs" id="settings-region-tabs"></div>
          <form id="settings-form">
            <div class="region-grid">
              <div class="control-group"><label>x (%)</label><input name="region-x" type="number" step="0.01"></div>
              <div class="control-group"><label>y (%)</label><input name="region-y" type="number" step="0.01"></div>
              <div class="control-group"><label>w (%)</label><input name="region-w" type="number" step="0.01"></div>
              <div class="control-group"><label>h (%)</label><input name="region-h" type="number" step="0.01"></div>
            </div>
          </form>
        </main>
      </div>
      <div class="form-actions">
        <button class="btn-cancel" id="btn-settings-save-close">保存して閉じる</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="auth-section">
      <span id="auth-status">未ログイン</span>
      <div class="top-actions">
        <button class="btn-ghost" id="settings_button" type="button"><span class="material-symbols-outlined">settings</span> 設定</button>
        <button class="btn-mode" id="btn-select-mode" type="button"><span class="material-symbols-outlined">check_box</span> 選択モード</button>
        <button class="btn-auth btn-upload" id="upload_button" style="display: none;" type="button"><span class="material-symbols-outlined">add_photo_alternate</span> アップロード</button>
        <button class="btn-auth" id="authorize_button" type="button"><span class="material-symbols-outlined">login</span> Googleでログイン</button>
        <button class="btn-auth btn-signout" id="signout_button" style="display: none;" type="button"><span class="material-symbols-outlined">logout</span> ログアウト</button>
      </div>
    </div>

    <h2><span class="material-symbols-outlined">library_music</span> リザルト管理 (My Drive)</h2>

    <div class="controls">
      <div class="control-group">
        <label><span class="material-symbols-outlined">sort</span> 並べ替え</label>
        <select id="sort-order">
          <option value="title">名前順</option>
          <option value="level" selected>楽曲レベル順</option>
          <option value="miss">ミス数順</option>
          <option value="date">追加日順</option>
        </select>
      </div>
      <div class="control-group">
        <label>&nbsp;</label>
        <button class="btn-ghost" id="sort-direction" type="button" data-direction="desc">降順</button>
      </div>
      <div class="control-group">
        <label><span class="material-symbols-outlined">filter_alt</span> FC状況</label>
        <select id="filter-fc">
          <option value="all">すべて</option>
          <option value="fc">FC済み (FC-0)</option>
          <option value="unfc">未FC (失点あり)</option>
        </select>
      </div>
      <div class="control-group">
        <label><span class="material-symbols-outlined">done_all</span> 自己ベスト</label>
        <label class="switch"><input id="filter-best-only" type="checkbox"><span id="best-toggle-label">自己ベストのみ</span></label>
      </div>
      <div class="control-group">
        <label><span class="material-symbols-outlined">remove_circle</span> 失点数 (範囲)</label>
        <div class="range-inputs">
          <input id="filter-miss-min" min="0" placeholder="0" type="number"/>
          <span>~</span>
          <input id="filter-miss-max" min="0" placeholder="Max" type="number"/>
        </div>
      </div>
      <div class="control-group">
        <label><span class="material-symbols-outlined">speed</span> 難易度</label>
        <select id="filter-diff">
          <option value="all">すべて</option>
          <option value="easy">EASY</option>
          <option value="normal">NORMAL</option>
          <option value="hard">HARD</option>
          <option value="expert">EXPERT</option>
          <option value="master">MASTER</option>
          <option value="append">APPEND</option>
        </select>
      </div>
      <div class="control-group">
        <label><span class="material-symbols-outlined">manage_search</span> 曲名検索</label>
        <input id="filter-title" placeholder="曲名を入力..." type="text"/>
      </div>
      <div class="control-group">
        <label><span class="material-symbols-outlined">search</span> レベル検索</label>
        <input id="filter-level" placeholder="" type="number"/>
      </div>
    </div>

    <div class="status-bar">
      <span id="result-count">ログインしてください</span>
    </div>

    <div id="loader">
      <div class="spinner"></div>
      <div id="loader-text">データを読み込み中...</div>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <div id="batch-actions" style="display:none;">
    <button class="btn-batch deselect" id="btn-clear-selection" type="button"><span class="material-symbols-outlined">close</span> 選択解除</button>
    <button class="btn-batch delete" id="btn-batch-delete" type="button"><span class="material-symbols-outlined">delete</span> 削除</button>
    <button class="btn-batch edit" id="btn-batch-edit" type="button"><span class="material-symbols-outlined">edit_note</span> 編集・解析</button>
    <div style="margin-left:auto; display:flex; align-items:center; color:#666;">
      <span id="selected-count">0</span> 件選択中
    </div>
  </div>
</body>
</html>
