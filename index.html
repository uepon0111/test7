<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>プロセカ リザルト管理</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>

    <div id="imageModal" class="modal" onclick="if(event.target === this) closeImageModal()">
      <span class="close-btn" onclick="closeImageModal()">&times;</span>
      <img class="modal-content-img" id="modalImg">
    </div>

    <div id="batchModal" class="modal" style="background-color: rgba(0,0,0,0.5);">
      <div class="modal-form-content">
        <div class="modal-header">
          <span id="batch-modal-title"><span class="material-symbols-outlined">cloud_upload</span> 画像アップロード・編集</span>
          <span style="cursor:pointer;" onclick="closeBatchModal()">&times;</span>
        </div>
        
        <div id="upload-initial" style="display: flex; flex: 1;">
            <div id="drop-zone" class="drop-zone" onclick="document.getElementById('up-file').click()">
            <span class="material-symbols-outlined" style="font-size: 64px; margin-bottom: 10px;">upload_file</span>
            <div style="font-size: 1.2rem; font-weight: bold;">クリックして画像を選択</div>
            <div style="font-size: 0.9rem; margin-top: 5px;">または画像をここにドラッグ＆ドロップ</div>
            <input type="file" id="up-file" accept="image/*" multiple style="display: none;">
            </div>
        </div>

        <div id="batch-workspace" class="split-container" style="display: none;">
            <div class="sidebar">
                <div class="sidebar-toolbar">
                    <button class="btn-analyze-all" onclick="analyzeAllInBatch()">
                        <span class="material-symbols-outlined">analytics</span> 一括解析 (すべて)
                    </button>
                </div>
                <div id="batch-sidebar-list" style="overflow-y:auto; flex:1;"></div>
            </div>
            
            <div class="main-area">
                <div id="batch-editor-container" class="editor-layout" style="display: none;">
                    <div class="preview-pane">
                        <img id="batch-preview-img" src="" crossorigin="anonymous">
                    </div>
                    <div class="form-pane">
                        <button type="button" class="btn-reanalyze" onclick="reanalyzeCurrentItem()">
                            <span class="material-symbols-outlined" style="font-size:1rem;">analytics</span> この画像を再解析
                        </button>

                        <div class="form-group">
                            <label>曲名</label>
                            <input type="text" id="up-title" style="width: 100%; box-sizing: border-box;" oninput="updateCurrentItem('title', this.value)">
                        </div>
                        <div style="display:flex; gap:10px;">
                            <div class="form-group" style="flex:1;">
                                <label>レベル</label>
                                <input type="number" id="up-level" style="width: 100%; box-sizing: border-box;" oninput="updateCurrentItem('level', this.value)">
                            </div>
                            <div class="form-group" style="flex:1;">
                                <label>難易度</label>
                                <select id="up-diff" style="width: 100%; box-sizing: border-box;" onchange="updateCurrentItem('diff', this.value)">
                                    <option value="A">APPEND</option>
                                    <option value="M">MASTER</option>
                                    <option value="E">EXPERT</option>
                                    <option value="H">HARD</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>機種</label>
                            <select id="up-device" style="width: 100%; box-sizing: border-box;" onchange="updateCurrentItem('deviceKey', this.value)"></select>
                        </div>
                        <div class="form-group">
                            <label>判定内訳</label>
                            <div class="breakdown-group">
                                <div class="breakdown-item">
                                    <label style="color:#8ac5f7;">PERFECT</label>
                                    <input type="number" id="up-perfect" min="0" value="0" oninput="updateCurrentItem('perfect', this.value)">
                                </div>
                                <div class="breakdown-item">
                                    <label style="color:#9bfcc0;">GREAT</label>
                                    <input type="number" id="up-great" min="0" value="0" oninput="updateCurrentItem('great', this.value)">
                                </div>
                                <div class="breakdown-item">
                                    <label style="color:#e0e0e0;">MISS</label>
                                    <input type="number" id="up-miss-detail" min="0" value="0" oninput="updateCurrentItem('missCount', this.value)">
                                </div>
                            </div>
                            <div class="breakdown-group" style="margin-top:10px;">
                                <div class="breakdown-item">
                                    <label style="color:#f59e0b;">COMBO</label>
                                    <input type="number" id="up-combo" min="0" value="0" oninput="updateCurrentItem('combo', this.value)">
                                </div>
                            </div>
                            <div class="total-score">
                                総ミス数: <span id="up-total-miss" style="font-size:1.2rem; color:var(--diff-master);">0</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="batch-empty-msg" style="margin:auto; color:#999; text-align:center;">
                    左のリストから画像を選択してください
                </div>
            </div>
        </div>

        <div class="modal-header" style="font-size: 0.9rem; padding: 10px 20px; background: #f8f9fa; border-top: 1px solid #eee; border-bottom: none; display:block;" id="batch-msg-area">
             <span id="batch-status-msg">待機中...</span>
        </div>

        <div class="form-actions">
          <button class="btn-cancel" onclick="closeBatchModal()">閉じる</button>
          <button class="btn-submit" id="btn-exec-batch" onclick="handleBatchExecution()" disabled>実行</button>
        </div>
      </div>
    </div>

    <div class="container">
      
      <div class="auth-section top-actions">
        <span id="auth-status">未ログイン</span>

        <button id="btn-select-mode" class="btn-mode" onclick="toggleSelectMode()">
            <span class="material-symbols-outlined">check_box</span> 選択モード
        </button>

        <button id="upload_button" class="btn-auth btn-upload" onclick="openBatchModal('upload')" style="display: none;">
          <span class="material-symbols-outlined">add_photo_alternate</span> アップロード
        </button>

        <button id="settings-open-btn" class="btn-auth btn-gear" onclick="openSettingsModal()">
          <span class="material-symbols-outlined">settings</span> 設定
        </button>

        <button id="authorize_button" class="btn-auth" onclick="handleAuthClick()">
          <span class="material-symbols-outlined">login</span> Googleでログイン
        </button>
        <button id="signout_button" class="btn-auth btn-signout" onclick="handleSignoutClick()" style="display: none;">
          <span class="material-symbols-outlined">logout</span> ログアウト
        </button>
      </div>

      <h2><span class="material-symbols-outlined">library_music</span> リザルト管理 (My Drive)</h2>
      
      
      <div class="controls">
        <div class="control-group">
          <label><span class="material-symbols-outlined">sort</span> 並べ替え</label>
          <select id="sort-order" onchange="updateView()">
            <option value="title">名前順</option>
            <option value="level" selected>楽曲レベル順</option>
            <option value="miss">ミス数順</option>
            <option value="date">追加日順</option>
          </select>
        </div>

        <div class="control-group">
          <label><span class="material-symbols-outlined">swap_vert</span> 並び順</label>
          <button type="button" id="sort-dir-btn" class="btn-mode" onclick="toggleSortDirection()">降順</button>
        </div>

        <div class="control-group">
          <label><span class="material-symbols-outlined">filter_alt</span> FC状況</label>
          <select id="filter-fc" onchange="updateView()">
            <option value="all">すべて</option>
            <option value="fc">FC済み (FC-0)</option>
            <option value="unfc">未FC (失点あり)</option>
          </select>
        </div>

        <div class="control-group">
          <label><span class="material-symbols-outlined">remove_circle</span> 失点数 (範囲)</label>
          <div class="range-inputs">
            <input type="number" id="filter-miss-min" placeholder="0" min="0" oninput="updateView()">
            <span>~</span>
            <input type="number" id="filter-miss-max" placeholder="Max" min="0" oninput="updateView()">
          </div>
        </div>

        <div class="control-group">
          <label><span class="material-symbols-outlined">speed</span> 難易度</label>
          <select id="filter-diff" onchange="updateView()">
            <option value="all">すべて</option>
          </select>
        </div>

        <div class="control-group">
          <label><span class="material-symbols-outlined">manage_search</span> 曲名検索</label>
          <input type="text" id="filter-title" placeholder="曲名を入力..." oninput="updateView()">
        </div>

        <div class="control-group">
          <label><span class="material-symbols-outlined">search</span> レベル検索</label>
          <input type="number" id="filter-level" placeholder="" oninput="updateView()">
        </div>

        <div class="control-group">
          <label><span class="material-symbols-outlined">workspace_premium</span> 表示</label>
          <div class="switch-wrap">
            <input type="checkbox" id="filter-best" onchange="updateView()">
            <label for="filter-best" style="margin:0; font-size:0.9rem; font-weight:700; color:#555;">自己ベストのみ</label>
          </div>
        </div>
      </div>

      <div class="status-bar">
        <span id="result-count">ログインしてください</span>
        <div style="flex:1; max-width:420px; margin-left:16px;">
          <div id="view-progress-wrap" class="progress-wrap"><div id="view-progress-bar" class="progress-bar"></div></div>
          <div id="view-progress-label" class="progress-label"></div>
        </div>
      </div>

      <div id="loader">
        <div class="spinner"></div>
        <div id="loader-text">データを読み込み中...</div>
      </div>
      
      <div id="grid" class="grid"></div>
    </div>

    <div id="batch-actions">
        <button class="btn-batch deselect" onclick="clearSelection()"><span class="material-symbols-outlined">close</span> 選択解除</button>
        <button class="btn-batch delete" onclick="batchDelete()"><span class="material-symbols-outlined">delete</span> 削除</button>
        <button class="btn-batch edit" onclick="batchEdit()"><span class="material-symbols-outlined">edit_note</span> 編集・解析</button>
        <div style="margin-left:auto; display:flex; align-items:center; color:#666;">
            <span id="selected-count">0</span> 件選択中
        </div>
    </div>

    
    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/drive.js"></script>
    <script src="js/ocr.js"></script>
    <script src="js/app.js"></script>
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

    <div id="settingsModal" class="modal" style="background-color: rgba(0,0,0,0.5);" data-close-modal="true">
      <div class="modal-form-content" style="width:min(1200px, 96vw); max-width:none;">
        <div class="modal-header">
          <span><span class="material-symbols-outlined">settings</span> 読み取り範囲設定</span>
          <span id="settings-close-btn" style="cursor:pointer;">&times;</span>
        </div>
        <div class="settings-layout">
          <div class="settings-panel">
            <div style="display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:12px;">
              <strong>機種一覧</strong>
              <button type="button" id="settings-add-profile" class="btn-mode">新規</button>
            </div>
            <div id="settings-profile-list" class="profile-list"></div>
            <div style="margin-top:12px; display:flex; gap:8px;">
              <button type="button" id="settings-save-profile" class="btn-auth" style="flex:1;">保存</button>
              <button type="button" id="settings-delete-profile" class="btn-auth btn-signout" style="flex:1;">削除</button>
            </div>
            <div style="margin-top:12px; color:#666; font-size:12px;">選択中: <b id="settings-profile-key"></b></div>
          </div>
          <div class="settings-panel">
            <div style="display:flex; gap:10px; align-items:center; margin-bottom:10px; flex-wrap:wrap;">
              <label style="font-weight:700;">機種名</label>
              <input id="settings-profile-name" type="text" style="flex:1; min-width:180px;">
              <input id="settings-sample-input" type="file" accept="image/*">
            </div>
            <div class="region-selector" style="margin-bottom:10px;">
              <button type="button" class="region-chip" data-region="title" onclick="window.PRSK.app.selectSettingsRegion('title')">曲名</button>
              <button type="button" class="region-chip" data-region="diff" onclick="window.PRSK.app.selectSettingsRegion('diff')">難易度</button>
              <button type="button" class="region-chip" data-region="result" onclick="window.PRSK.app.selectSettingsRegion('result')">リザルト</button>
              <button type="button" class="region-chip" data-region="combo" onclick="window.PRSK.app.selectSettingsRegion('combo')">コンボ</button>
            </div>
            <div id="settings-preview-wrap" class="settings-preview-wrap">
              <img id="settings-preview-img" class="settings-preview-img" src="" alt="sample">
              <div id="settings-overlay" class="settings-overlay"></div>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin:10px 0 6px;">
              <strong>座標 (%): <span id="settings-region-label"></span></strong>
            </div>
            <div class="coord-grid">
              <input id="settings-region-x" type="number" min="0" max="100" step="0.01">
              <input id="settings-region-y" type="number" min="0" max="100" step="0.01">
              <input id="settings-region-w" type="number" min="1" max="100" step="0.01">
              <input id="settings-region-h" type="number" min="1" max="100" step="0.01">
            </div>
            <div style="margin-top:8px; color:#64748b; font-size:12px;">ドラッグで範囲を移動・右下ハンドルでサイズ変更できます。数値変更も反映されます。</div>
          </div>
        </div>
      </div>
    </div>

    <div id="toast-stack" class="toast-stack"></div>
  </body>
</html>
