<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>プロセカ リザルト管理</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="./css/app.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  </head>
  <body>
    <div id="imageModal" class="modal" onclick="if(event.target === this) closeImageModal()">
      <span class="close-btn" onclick="closeImageModal()">&times;</span>
      <img class="modal-content-img" id="modalImg" alt="result">
    </div>

    <div id="batchModal" class="modal" style="background-color: rgba(0,0,0,0.5);">
      <div class="modal-form-content">
        <div class="modal-header">
          <span id="batch-modal-title"><span class="material-symbols-outlined">cloud_upload</span> 画像アップロード・編集</span>
          <span style="cursor:pointer;" onclick="closeBatchModal()">&times;</span>
        </div>

        <div id="upload-initial" style="display: flex; flex: 1;">
          <div id="drop-zone" class="drop-zone" onclick="document.getElementById('up-file').click()">
            <span class="material-symbols-outlined" style="font-size: 64px; margin-bottom: 10px;">upload_file</span>
            <div style="font-size: 1.2rem; font-weight: bold;">クリックして画像を選択</div>
            <div style="font-size: 0.9rem; margin-top: 5px;">または画像をここにドラッグ＆ドロップ</div>
            <input type="file" id="up-file" accept="image/*" multiple style="display: none;">
          </div>
        </div>

        <div id="batch-workspace" class="split-container" style="display: none;">
          <div class="sidebar">
            <div class="sidebar-toolbar">
              <button class="btn-analyze-all" onclick="analyzeAllInBatch()">
                <span class="material-symbols-outlined">analytics</span> 一括解析 (すべて)
              </button>
            </div>
            <div id="batch-sidebar-list" style="overflow-y:auto; flex:1;"></div>
          </div>

          <div class="main-area">
            <div id="batch-editor-container" class="editor-layout" style="display: none;">
              <div class="preview-pane">
                <img id="batch-preview-img" src="" crossorigin="anonymous" alt="preview">
              </div>
              <div class="form-pane">
                <button type="button" class="btn-reanalyze" onclick="reanalyzeCurrentItem()">
                  <span class="material-symbols-outlined" style="font-size:1rem;">analytics</span> この画像を再解析
                </button>

                <div class="form-group">
                  <label>曲名</label>
                  <input type="text" id="up-title" style="width: 100%; box-sizing: border-box;" oninput="updateCurrentItem('title', this.value)">
                </div>

                <div class="machine-row form-group">
                  <div>
                    <label>機種</label>
                    <select id="up-machine" style="width: 100%; box-sizing: border-box;"></select>
                  </div>
                  <button type="button" class="btn-small mini-btn" onclick="openSettingsModal()">
                    <span class="material-symbols-outlined" style="font-size:1rem;">tune</span> 設定
                  </button>
                </div>

                <div style="display:flex; gap:10px;">
                  <div class="form-group" style="flex:1;">
                    <label>レベル</label>
                    <input type="number" id="up-level" style="width: 100%; box-sizing: border-box;" oninput="updateCurrentItem('level', this.value)">
                  </div>
                  <div class="form-group" style="flex:1;">
                    <label>難易度</label>
                    <select id="up-diff" style="width: 100%; box-sizing: border-box;" onchange="updateCurrentItem('diff', this.value)">
                      <option value="EASY">EASY</option>
                      <option value="NORMAL">NORMAL</option>
                      <option value="HARD">HARD</option>
                      <option value="EXPERT" selected>EXPERT</option>
                      <option value="MASTER">MASTER</option>
                      <option value="APPEND">APPEND</option>
                    </select>
                  </div>
                </div>

                <div class="form-group">
                  <label>判定内訳</label>
                  <div class="count-inputs">
                    <div class="breakdown-item">
                      <label style="color:#6f9cfa;">PERFECT</label>
                      <input type="number" id="up-perfect" min="0" value="0" oninput="updateCurrentItem('perfect', this.value)">
                    </div>
                    <div class="breakdown-item">
                      <label style="color:#7ad0f1;">GREAT</label>
                      <input type="number" id="up-great" min="0" value="0" oninput="updateCurrentItem('great', this.value)">
                    </div>
                    <div class="breakdown-item">
                      <label style="color:#8ac5f7;">GOOD</label>
                      <input type="number" id="up-good" min="0" value="0" oninput="updateCurrentItem('good', this.value)">
                    </div>
                    <div class="breakdown-item">
                      <label style="color:#9bfcc0;">BAD</label>
                      <input type="number" id="up-bad" min="0" value="0" oninput="updateCurrentItem('bad', this.value)">
                    </div>
                    <div class="breakdown-item">
                      <label style="color:#e0e0e0;">MISS</label>
                      <input type="number" id="up-miss-detail" min="0" value="0" oninput="updateCurrentItem('missDetail', this.value)">
                    </div>
                  </div>
                  <div class="combo-row">
                    <label>COMBO</label>
                    <input type="number" id="up-combo" min="0" value="0" style="width: 100%; box-sizing: border-box;" oninput="updateCurrentItem('combo', this.value)">
                  </div>
                  <div class="total-score">
                    総ミス数: <span id="up-total-miss" style="font-size:1.2rem; color:var(--diff-master);">0</span>
                  </div>
                </div>
              </div>
            </div>
            <div id="batch-empty-msg" style="margin:auto; color:#999; text-align:center;">
              左のリストから画像を選択してください
            </div>
          </div>
        </div>

        <div class="modal-header" style="font-size: 0.9rem; padding: 10px 20px; background: #f8f9fa; border-top: 1px solid #eee; border-bottom: none; display:block;" id="batch-msg-area">
          <span id="batch-status-msg">待機中...</span>
        </div>

        <div class="form-actions">
          <button class="btn-cancel" onclick="closeBatchModal()">閉じる</button>
          <button class="btn-submit" id="btn-exec-batch" onclick="handleBatchExecution()" disabled>実行</button>
        </div>
      </div>
    </div>

    <div id="settingsModal" class="modal" style="background-color: rgba(0,0,0,0.5);">
      <div class="modal-form-content" style="width:min(1200px, 95vw); height:min(90vh, 920px);">
        <div class="modal-header">
          <span><span class="material-symbols-outlined">tune</span> 機種別の範囲設定</span>
          <span style="cursor:pointer;" onclick="closeSettingsModal()">&times;</span>
        </div>

        <div class="settings-layout">
          <div class="profile-list" id="settings-profile-list"></div>

          <div style="display:flex; flex-direction:column; gap:12px; min-height:0;">
            <div class="settings-actions">
              <button class="btn-small btn-inline" id="settings-new-profile" type="button">
                <span class="material-symbols-outlined" style="font-size:1rem;">add</span> 新規作成
              </button>
              <button class="btn-small btn-inline" id="settings-save-profile" type="button">
                <span class="material-symbols-outlined" style="font-size:1rem;">save</span> 保存
              </button>
              <button class="btn-small btn-inline" id="settings-delete-profile" type="button">
                <span class="material-symbols-outlined" style="font-size:1rem;">delete</span> 削除
              </button>
            </div>

            <div class="settings-controls">
              <div class="form-group">
                <label>機種名</label>
                <input type="text" id="settings-profile-name" style="width:100%; box-sizing:border-box;">
              </div>

              <div class="form-group">
                <label>編集対象の機種</label>
                <select id="settings-profile-select" style="width:100%; box-sizing:border-box;"></select>
              </div>

              <div class="inline-row">
                <div class="form-group">
                  <label>画像幅</label>
                  <input type="number" id="settings-profile-width" style="width:100%; box-sizing:border-box;">
                </div>
                <div class="form-group">
                  <label>画像高さ</label>
                  <input type="number" id="settings-profile-height" style="width:100%; box-sizing:border-box;">
                </div>
                <div class="form-group">
                  <label>現在</label>
                  <div id="settings-profile-status" style="padding:10px 0; color:#667085; font-weight:700;">-</div>
                </div>
              </div>

              <div class="form-group">
                <label>サンプル画像</label>
                <input type="file" id="settings-sample-file" accept="image/*" style="width:100%; box-sizing:border-box;">
                <div id="settings-sample-info" style="margin-top:6px; color:#667085; font-size:0.85rem;">サンプル画像未設定</div>
              </div>

              <div class="machine-row">
                <div class="form-group">
                  <label>編集対象の範囲</label>
                  <select id="settings-region-key" style="width:100%; box-sizing:border-box;">
                    <option value="diff">難易度</option>
                    <option value="title">曲名</option>
                    <option value="result">リザルト(Perfect/Great/Good/Bad/Miss)</option>
                    <option value="combo">Combo</option>
                  </select>
                </div>
              </div>

              <div class="settings-editor">
                <div class="settings-preview" id="settings-preview-wrap">
                  <img id="settings-preview-img" src="" alt="sample preview">
                  <div class="settings-region-layer" id="settings-region-overlay"></div>
                </div>

                <div style="display:flex; flex-direction:column; gap:12px;">
                  <div class="form-group">
                    <label>範囲を数値で調整 (px)</label>
                    <div class="count-inputs" style="grid-template-columns: repeat(2, minmax(0, 1fr));">
                      <div class="breakdown-item">
                        <label>X</label>
                        <input type="number" id="settings-region-x" min="0">
                      </div>
                      <div class="breakdown-item">
                        <label>Y</label>
                        <input type="number" id="settings-region-y" min="0">
                      </div>
                      <div class="breakdown-item">
                        <label>W</label>
                        <input type="number" id="settings-region-w" min="1">
                      </div>
                      <div class="breakdown-item">
                        <label>H</label>
                        <input type="number" id="settings-region-h" min="1">
                      </div>
                    </div>
                  </div>

                  <div style="color:#667085; font-size:0.85rem; line-height:1.55;">
                    範囲は画像上でドラッグ移動、右下のハンドルで拡大縮小できます。<br>
                    サンプル画像の画素数に合わせて機種設定を保存してください。
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="container">
      <div class="auth-section">
        <span id="auth-status">未ログイン</span>

        <button id="btn-settings" class="btn-auth btn-settings" onclick="openSettingsModal()">
          <span class="material-symbols-outlined">tune</span> 設定
        </button>

        <button id="btn-select-mode" class="btn-mode" onclick="toggleSelectMode()">
          <span class="material-symbols-outlined">check_box</span> 選択モード
        </button>

        <button id="upload_button" class="btn-auth btn-upload" onclick="openBatchModal('upload')" style="display: none;">
          <span class="material-symbols-outlined">add_photo_alternate</span> アップロード
        </button>

        <button id="authorize_button" class="btn-auth" onclick="handleAuthClick()">
          <span class="material-symbols-outlined">login</span> Googleでログイン
        </button>
        <button id="signout_button" class="btn-auth btn-signout" onclick="handleSignoutClick()" style="display: none;">
          <span class="material-symbols-outlined">logout</span> ログアウト
        </button>
      </div>

      <h2><span class="material-symbols-outlined">library_music</span> リザルト管理 (My Drive)</h2>

      <div class="controls">
        <div class="control-group">
          <label><span class="material-symbols-outlined">sort</span> 並べ替え</label>
          <div class="sort-control-row">
            <select id="sort-order" onchange="updateView()">
              <option value="title">名前順</option>
              <option value="level" selected>楽曲レベル順</option>
              <option value="miss">ミス数順</option>
              <option value="date">追加日順</option>
            </select>
            <button id="sort-dir-toggle" type="button" class="btn-small mini-btn" onclick="toggleSortDirection()" data-dir="desc">降順</button>
          </div>
        </div>

        <div class="control-group">
          <label><span class="material-symbols-outlined">filter_alt</span> FC状況</label>
          <select id="filter-fc" onchange="updateView()">
            <option value="all">すべて</option>
            <option value="fc">FC済み (FC-0)</option>
            <option value="unfc">未FC (失点あり)</option>
          </select>
        </div>

        <div class="control-group">
          <label><span class="material-symbols-outlined">remove_circle</span> 失点数 (範囲)</label>
          <div class="range-inputs">
            <input type="number" id="filter-miss-min" placeholder="0" min="0" oninput="updateView()">
            <span>~</span>
            <input type="number" id="filter-miss-max" placeholder="Max" min="0" oninput="updateView()">
          </div>
        </div>

        <div class="control-group">
          <label><span class="material-symbols-outlined">speed</span> 難易度</label>
          <select id="filter-diff" onchange="updateView()">
            <option value="all">すべて</option>
            <option value="EASY">EASY</option>
            <option value="NORMAL">NORMAL</option>
            <option value="HARD">HARD</option>
            <option value="EXPERT">EXPERT</option>
            <option value="MASTER">MASTER</option>
            <option value="APPEND">APPEND</option>
          </select>
        </div>

        <div class="control-group">
          <label><span class="material-symbols-outlined">manage_search</span> 曲名検索</label>
          <input type="text" id="filter-title" placeholder="曲名を入力..." oninput="updateView()">
        </div>

        <div class="control-group">
          <label><span class="material-symbols-outlined">search</span> レベル検索</label>
          <input type="number" id="filter-level" placeholder="" oninput="updateView()">
        </div>

        <div class="control-group">
          <label><span class="material-symbols-outlined">verified</span> 表示</label>
          <label class="toggle-chip">
            <input type="checkbox" id="filter-show-best" onchange="updateView()">
            自己ベストのみ
          </label>
        </div>
      </div>

      <div id="view-progress-wrap">
        <div class="progress-track"><div id="view-progress-bar" class="progress-bar"></div></div>
        <div id="view-progress-text">-</div>
      </div>

      <div class="status-bar">
        <span id="result-count">ログインしてください</span>
      </div>

      <div id="loader">
        <div class="spinner"></div>
        <div id="loader-text">データを読み込み中...</div>
      </div>

      <div id="grid" class="grid"></div>
    </div>

    <div id="batch-actions">
      <button class="btn-batch deselect" onclick="clearSelection()"><span class="material-symbols-outlined">close</span> 選択解除</button>
      <button class="btn-batch delete" onclick="batchDelete()"><span class="material-symbols-outlined">delete</span> 削除</button>
      <button class="btn-batch edit" onclick="batchEdit()"><span class="material-symbols-outlined">edit_note</span> 編集・解析</button>
      <div style="margin-left:auto; display:flex; align-items:center; color:#666;">
        <span id="selected-count">0</span> 件選択中
      </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="https://apis.google.com/js/api.js" async defer></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
